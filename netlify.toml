# QSortby — Astro on Netlify
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-lived caching for immutable assets (fonts + content-hashed _astro files).
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "https://qsortby.netlify.app/*"
  to   = "https://qsortby.com/:splat"
  status = 301
  force = true